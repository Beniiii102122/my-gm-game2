<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>プロ野球GMマネージャー - 初期設定機能付き</title>
    <style>
        :root {
            --primary: #1a2a6c;
            --secondary: #b21f1f;
            --accent: #fdbb2d;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text-dark: #2c3e50;
        }

        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text-dark); margin: 0; padding: 20px; }
        
        /* 画面共通レイヤー */
        .screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: 0.5s; }
        .hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        /* タイトル画面 */
        #startScreen { background: linear-gradient(135deg, #1a2a6c, #b21f1f); color: white; }
        .logo-main { font-size: 4rem; font-weight: 900; text-shadow: 4px 4px 0px rgba(0,0,0,0.3); margin-bottom: 20px; }

        /* 設定画面 */
        #setupScreen { background: white; color: var(--text-dark); }
        .setup-box { background: #f8f9fa; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        .setup-box h2 { color: var(--primary); margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9em; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }

        /* ボタン */
        .btn-main { padding: 15px 60px; font-size: 1.2rem; font-weight: bold; cursor: pointer; border: none; border-radius: 50px; transition: 0.3s; }
        .btn-start { background: var(--accent); color: var(--primary); }
        .btn-setup { background: var(--primary); color: white; margin-top: 20px; width: 100%; }

        /* メインUI */
        .container { max-width: 1000px; margin: auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-item { background: var(--primary); color: white; padding: 10px; border-radius: 10px; text-align: center; }
        .stat-value { font-size: 1.1em; font-weight: bold; display: block; }

        .player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
        .player-card { background: #fff; border: 1px solid #ddd; padding: 12px; border-radius: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .player-card:hover { background: #eef2ff; border-color: var(--primary); }

        /* 詳細モーダル */
        .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: white; margin: 10% auto; padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; position: relative; }
        
        .rank-S { color: #ff00ff; } .rank-A { color: #ff4500; } .rank-B { color: #ffa500; }
        .rank-C { color: #ffd700; } .rank-D { color: #32cd32; } .rank-E { color: #1e90ff; }
    </style>
</head>
<body>

<div id="startScreen" class="screen">
    <div class="logo-main">ELITE GM</div>
    <button class="btn-main btn-start" onclick="showSetup()">PRESS START</button>
</div>

<div id="setupScreen" class="screen hidden">
    <div class="setup-box">
        <h2>チーム設定</h2>
        <div class="form-group">
            <label>チーム名</label>
            <input type="text" id="inputTeamName" placeholder="例：東京レジェンズ">
        </div>
        <div class="form-group">
            <label>本拠地都市</label>
            <input type="text" id="inputCity" placeholder="例：東京">
        </div>
        <div class="form-group">
            <label>難易度</label>
            <select id="inputDifficulty">
                <option value="easy">イージー (予算多め)</option>
                <option value="normal" selected>ノーマル</option>
                <option value="hard">ハード (予算カツカツ)</option>
            </select>
        </div>
        <button class="btn-main btn-setup" onclick="startGame()">この内容でGM就任</button>
    </div>
</div>

<div class="container">
    <h2 id="displayTeamName" style="text-align: center; color: var(--primary); margin-bottom: 5px;">⚾ チーム未設定</h2>
    <p id="displayCity" style="text-align: center; color: #666; margin-top: 0; font-size: 0.9em;">-</p>
    
    <div class="stats-grid">
        <div class="stat-item"><span class="stat-label">日付</span><span class="stat-value" id="date">2月1日</span></div>
        <div class="stat-item"><span class="stat-label">予算</span><span class="stat-value" id="budget">0億円</span></div>
        <div class="stat-item"><span class="stat-label">試合数</span><span class="stat-value" id="gameCount">0 / 143</span></div>
        <div class="stat-item"><span class="stat-label">勝率 (勝-敗)</span><span class="stat-value" id="record">.000 (0-0)</span></div>
        <div class="stat-item" style="background: var(--accent); color: var(--primary);"><span class="stat-label">順位</span><span class="stat-value" id="rank">- 位</span></div>
    </div>

    <div style="text-align: center; margin-bottom: 20px;">
        <button onclick="advanceDays(1)" style="padding: 10px 20px; cursor:pointer;">1日進める</button>
        <button id="btnAuto" onclick="startAuto()" style="background:var(--secondary); color:white; padding: 10px 20px; cursor:pointer;">オート進行</button>
        <button id="btnStop" onclick="stopAuto()" style="display:none; padding: 10px 20px; cursor:pointer;">停止</button>
    </div>

    <div class="main-card" style="background: white; padding: 20px; border-radius: 15px;">
        <div style="display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 2px solid #eee;">
            <div id="tab1" class="tab active" onclick="switchTab(1)" style="padding: 10px; cursor:pointer; font-weight:bold;">1軍 投手</div>
            <div id="tab2" class="tab" onclick="switchTab(2)" style="padding: 10px; cursor:pointer; font-weight:bold;">1軍 野手</div>
            <div id="tab3" class="tab" onclick="switchTab(3)" style="padding: 10px; cursor:pointer; font-weight:bold;">2軍</div>
        </div>
        <div class="player-grid" id="playerList"></div>
    </div>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <span onclick="closeDetail()" style="position:absolute; right:20px; top:15px; cursor:pointer; font-size:24px;">&times;</span>
        <div id="modalContent"></div>
    </div>
</div>

<script>
    // グローバル変数
    let teamName = "チーム名";
    let cityName = "本拠地";
    let budget = 500000;
    let wins = 0, losses = 0, totalGames = 0;
    let date = new Date(2026, 1, 1);
    let roster = [];
    let currentTab = 1;
    let autoTimer = null;

    // 設定画面へ移動
    function showSetup() {
        document.getElementById('startScreen').classList.add('hidden');
        document.getElementById('setupScreen').classList.remove('hidden');
    }

    // ゲーム開始（設定反映）
    function startGame() {
        const inputName = document.getElementById('inputTeamName').value;
        const inputCity = document.getElementById('inputCity').value;
        const diff = document.getElementById('inputDifficulty').value;

        teamName = inputName || "無名フェニックス";
        cityName = inputCity || "地方都市";
        
        // 難易度で予算変更
        if(diff === 'easy') budget = 1000000; 
        else if(diff === 'hard') budget = 300000;
        else budget = 500000;

        document.getElementById('displayTeamName').innerText = `⚾ ${teamName}`;
        document.getElementById('displayCity').innerText = `Home: ${cityName}`;
        document.getElementById('setupScreen').classList.add('hidden');
        
        initRoster();
        updateUI();
    }

    // 選手生成
    function createPlayer(pos) {
        const lastNames = ["佐藤", "鈴木", "高橋", "田中", "伊藤", "山本", "中村", "小林"];
        return {
            id: Math.random(), 
            name: lastNames[Math.floor(Math.random()*8)] + " 選手",
            pos: pos, age: 24, status: 1, salary: 1500,
            v_speed: 140 + Math.floor(Math.random()*15),
            v_con: 30 + Math.floor(Math.random()*50),
            b_meet: 30 + Math.floor(Math.random()*50),
            b_pow: 30 + Math.floor(Math.random()*50),
            avg_ab: 0, avg_h: 0, hr: 0, era_ip: 0, era_run: 0, win: 0, lose: 0
        };
    }

    function initRoster() {
        roster = [];
        for(let i=0; i<15; i++) roster.push(createPlayer('投手'));
        for(let i=0; i<15; i++) roster.push(createPlayer('野手'));
    }

    function advanceDays(days) {
        for(let i=0; i<days; i++) {
            date.setDate(date.getDate() + 1);
            if (totalGames < 143 && date.getMonth() >= 2 && date.getMonth() <= 8) {
                if (Math.random() < 0.7) simulateGame();
            }
        }
        updateUI();
    }

    function simulateGame() {
        totalGames++;
        let res = Math.random() < 0.5 ? "W" : "L";
        if(res === "W") wins++; else losses++;
        
        let p = roster.filter(x=>x.pos==='投手' && x.status===1)[Math.floor(Math.random()*5)];
        if(p) { p.era_ip += 9; p.era_run += Math.max(0, 4 - p.v_con/20); if(res==="W") p.win++; else p.lose++; }
        
        roster.filter(x=>x.pos==='野手' && x.status===1).forEach(b => {
            b.avg_ab += 4; if(Math.random() < 0.25) b.avg_h++;
            if(Math.random() < 0.05) b.hr++;
        });
    }

    function updateUI() {
        document.getElementById('date').innerText = `${date.getMonth()+1}月${date.getDate()}日`;
        document.getElementById('budget').innerText = `${(budget/10000).toFixed(2)}億円`;
        document.getElementById('gameCount').innerText = `${totalGames} / 143`;
        let wr = totalGames === 0 ? 0 : wins/(wins+losses);
        document.getElementById('record').innerText = `.${wr.toFixed(3).split('.')[1]} (${wins}-${losses})`;
        renderPlayerList();
    }

    function renderPlayerList() {
        const list = document.getElementById('playerList');
        list.innerHTML = "";
        let filtered = roster.filter(p => (currentTab===1 && p.pos==='投手' && p.status===1) || (currentTab===2 && p.pos==='野手' && p.status===1) || (currentTab===3 && p.status===2));
        filtered.forEach(p => {
            let div = document.createElement('div');
            div.className = "player-card";
            div.onclick = () => showDetail(p);
            div.innerHTML = `<span style="font-weight:bold;">${p.name}</span><span style="font-size:0.8em; color:#666;">${p.pos==='投手'?p.v_speed+'km':'打率 .'+(p.avg_h/(p.avg_ab||1)).toFixed(3).split('.')[1]}</span>`;
            list.appendChild(div);
        });
    }

    function showDetail(p) {
        const getRankChar = (v) => v>=80?'A':v>=70?'B':v>=60?'C':v>=50?'D':'E';
        let content = `
            <h3 style="color:var(--primary); margin-bottom:5px;">${p.name}</h3>
            <div style="font-size:0.9em; margin-bottom:15px;">${p.pos} / ${p.age}歳 / 年俸${p.salary}万</div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
                ${p.pos==='投手' ? `
                    <div style="background:#eee; padding:5px 10px;">球速: ${p.v_speed}km</div>
                    <div style="background:#eee; padding:5px 10px;">制球: <span class="rank-${getRankChar(p.v_con)}">${getRankChar(p.v_con)}</span></div>
                ` : `
                    <div style="background:#eee; padding:5px 10px;">ミート: <span class="rank-${getRankChar(p.b_meet)}">${getRankChar(p.b_meet)}</span></div>
                    <div style="background:#eee; padding:5px 10px;">パワー: <span class="rank-${getRankChar(p.b_pow)}">${getRankChar(p.b_pow)}</span></div>
                `}
            </div>
            <div style="font-size:0.85em; background:#f0f2f5; padding:10px; border-radius:5px;">
                <strong>通算成績:</strong><br>
                ${p.pos==='投手' ? `${p.win}勝 ${p.lose}敗 防御率 ${(p.era_run*9/(p.era_ip||1)).toFixed(2)}` : `打率 .${(p.avg_h/(p.avg_ab||1)).toFixed(3).split('.')[1]} ${p.hr}本塁打`}
            </div>
            <button onclick="toggleStatus(${p.id}); closeDetail();" style="width:100%; margin-top:15px; padding:10px; background:var(--primary); color:white; border:none; border-radius:5px; cursor:pointer;">
                ${p.status===1?'2軍へ':'1軍へ'}
            </button>
        `;
        document.getElementById('modalContent').innerHTML = content;
        document.getElementById('detailModal').style.display = 'block';
    }

    function closeDetail() { document.getElementById('detailModal').style.display = 'none'; }
    function startAuto() { if(!autoTimer) { document.getElementById('btnAuto').style.display='none'; document.getElementById('btnStop').style.display='inline-block'; autoTimer=setInterval(()=>advanceDays(1), 500); } }
    function stopAuto() { clearInterval(autoTimer); autoTimer=null; document.getElementById('btnAuto').style.display='inline-block'; document.getElementById('btnStop').style.display='none'; }
    function switchTab(t) { currentTab=t; document.querySelectorAll('.tab').forEach((el,i)=>el.style.borderBottom = i+1===t?'3px solid var(--primary)':'none'); renderPlayerList(); }
    function toggleStatus(id) { let p=roster.find(x=>x.id===id); p.status=p.status===1?2:1; renderPlayerList(); }

    window.onclick = (e) => { if(e.target == document.getElementById('detailModal')) closeDetail(); }
</script>
</body>
</html>
