<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>本格派GMシミュレーター - ビジュアライズ版</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #e9ecef; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a3a5a; border-bottom: 2px solid #1a3a5a; padding-bottom: 10px; margin-bottom: 20px; }
        
        /* 進行状態バーのスタイル */
        .progress-container { background: #dee2e6; border-radius: 10px; height: 25px; margin-bottom: 20px; position: relative; overflow: hidden; border: 1px solid #ccc; }
        .progress-bar { background: linear-gradient(90deg, #007bff, #00d4ff); height: 100%; width: 0%; transition: width 0.3s; }
        .progress-text { position: absolute; width: 100%; text-align: center; top: 0; font-size: 0.85em; line-height: 25px; font-weight: bold; color: #1a3a5a; }

        .stats { display: flex; justify-content: space-around; background: #1a3a5a; color: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; font-weight: bold; }
        .budget-info { text-align: center; font-size: 0.9em; margin-bottom: 20px; color: #666; }
        
        .control-panel { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; text-align: center; }
        .btn-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        .btn-day { background: #007bff; color: white; }
        .btn-auto { background: #dc3545; color: white; }
        .btn-stop { background: #6c757d; color: white; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }

        .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 15px; }
        .tab { padding: 10px 20px; cursor: pointer; background: #eee; border-radius: 5px 5px 0 0; margin-right: 5px; }
        .tab.active { background: #1a3a5a; color: white; }
        .table-container { height: 400px; overflow-y: auto; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 0.85em; }
        th, td { border: 1px solid #dee2e6; padding: 8px; text-align: center; }
        th { background: #f8f9fa; position: sticky; top: 0; z-index: 10; }
        
        .log { height: 180px; overflow-y: scroll; background: #222; color: #00ff00; padding: 15px; margin-top: 20px; font-family: monospace; border-radius: 5px; }
        .salary-red { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚾️ プロ野球GMシミュレーター</h1>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
        <div class="progress-text" id="progressText">シーズン進捗: 2月 (キャンプ)</div>
    </div>
    
    <div class="stats">
        <div id="date">📅 2026年2月1日</div>
        <div id="budget">💰 50億0000万円</div>
        <div id="record">📊 0勝 0敗</div>
    </div>
    <div class="budget-info" id="totalSalaryDisplay">チーム総年俸: 0万円</div>

    <div class="control-panel">
        <div class="btn-group">
            <button class="btn-day" onclick="advanceDays(1)">1日進める</button>
            <button class="btn-day" style="background:#6610f2" onclick="advanceDays(7)">1週間</button>
            <button class="btn-auto" id="btnAuto" onclick="startAuto()">オート進行開始</button>
            <button class="btn-stop" id="btnStop" onclick="stopAuto()" style="display:none;">オート停止</button>
            <button class="btn-day" style="background:#fd7e14" onclick="recruitForeigner()">外国人獲得(2億)</button>
        </div>
        <div id="autoStatus" style="font-size: 0.9em; color: #dc3545; margin-top: 5px; font-weight: bold;"></div>
    </div>

    <div class="tabs">
        <div id="tab1" class="tab active" onclick="switchTab(1)">1軍 (主力)</div>
        <div id="tab2" class="tab" onclick="switchTab(2)">2軍 (若手)</div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>名前</th><th>年齢</th><th>ミート</th><th>パワー</th><th>推定年俸</th><th>状態</th><th>入替</th>
                </tr>
            </thead>
            <tbody id="rosterBody"></tbody>
        </table>
    </div>

    <div class="log" id="logBox">>> 進行状態バーを実装しました。</div>
</div>

<script>
    let date = new Date(2026, 1, 1);
    let budget = 500000;
    let wins = 0; let losses = 0;
    let currentView = 1;
    let roster = [];
    let autoTimer = null;

    // 選手名データ
    const lastNames = ["佐藤", "鈴木", "高橋", "田中", "伊藤", "渡辺", "山本", "中村", "小林", "加藤", "吉田", "山田", "佐々木", "山口", "松本", "井上", "木村", "林", "清水", "斎藤", "山崎", "阿部", "森", "池田", "橋本", "石川", "山下", "小川", "岡田", "長谷川"];
    const firstNames = ["翔", "蓮", "湊", "悠真", "陽翔", "結斗", "大和", "颯太", "陽葵", "健太", "拓海", "和也", "哲也", "雄大", "翼", "慎太郎", "剛", "大輝", "誠", "直樹", "亮", "俊介", "裕太", "竜也", "隼人", "慶太", "貴大", "達也", "康平", "涼"];

    function generateRandomName() {
        return lastNames[Math.floor(Math.random() * lastNames.length)] + " " + firstNames[Math.floor(Math.random() * firstNames.length)];
    }

    for(let i=0; i<60; i++) {
        let age = Math.floor(Math.random() * 20) + 18;
        let meet = Math.floor(Math.random() * 50) + 20;
        let power = Math.floor(Math.random() * 50) + 20;
        let baseSalary = (meet + power) * (age > 30 ? 15 : 8);
        if (age < 22) baseSalary = 800 + Math.floor(Math.random() * 400);
        if (meet + power > 160) baseSalary += 20000;
        
        roster.push({
            id: i, name: generateRandomName(), age: age,
            bMonth: Math.floor(Math.random() * 12) + 1, bDay: Math.floor(Math.random() * 28) + 1,
            meet: meet, power: power, salary: Math.floor(baseSalary / 10) * 10, status: i < 30 ? 1 : 2
        });
    }

    function advanceDays(days) {
        for(let i=0; i<days; i++) {
            date.setDate(date.getDate() + 1);
            if (date.getDate() === 1) {
                let monthlyCost = Math.floor(getTotalSalary() / 12);
                budget -= monthlyCost;
                addLog(`💰 1日の運営費として ${monthlyCost}万円 を支払いました。`);
            }
            checkEvents();
        }
        updateUI();
        updateProgressBar();
    }

    // 進行バーの更新
    function updateProgressBar() {
        // 2月1日を0%、12月31日を100%として計算
        const start = new Date(2026, 1, 1).getTime();
        const end = new Date(2026, 11, 31).getTime();
        const current = date.getTime();
        const percent = ((current - start) / (end - start)) * 100;
        
        const bar = document.getElementById('progressBar');
        bar.style.width = Math.min(100, Math.max(0, percent)) + "%";

        const monthNames = ["", "1月", "2月(キャンプ)", "3月(開幕)", "4月", "5月", "6月", "7月", "8月", "9月", "10月(終盤/ドラフト)", "11月", "12月(更改)"];
        document.getElementById('progressText').innerText = `シーズン進捗: ${monthNames[date.getMonth()+1]}`;
    }

    function getTotalSalary() { return roster.reduce((sum, p) => sum + p.salary, 0); }

    function checkEvents() {
        roster.forEach(p => {
            if (p.bMonth === date.getMonth()+1 && p.bDay === date.getDate()) {
                p.age += 1;
                addLog(`🎂 ${p.name}(${p.age}歳) 誕生日おめでとう！`);
            }
        });
        if (date.getMonth() >= 2 && date.getMonth() <= 9 && Math.random() < 0.2) {
            if (Math.random() > 0.5) { wins++; addLog(`⚾️ ${date.getMonth()+1}/${date.getDate()}: 勝利！`); }
            else { losses++; addLog(`⚾️ ${date.getMonth()+1}/${date.getDate()}: 敗戦。`); }
        }
    }

    function startAuto() {
        if(autoTimer) return;
        document.getElementById('btnAuto').style.display = 'none';
        document.getElementById('btnStop').style.display = 'inline-block';
        document.getElementById('autoStatus').innerText = "オート進行中...";
        autoTimer = setInterval(() => { advanceDays(1); }, 500);
    }

    function stopAuto() {
        clearInterval(autoTimer);
        autoTimer = null;
        document.getElementById('btnAuto').style.display = 'inline-block';
        document.getElementById('btnStop').style.display = 'none';
        document.getElementById('autoStatus').innerText = "";
    }

    function updateUI() {
        document.getElementById('date').innerText = `📅 ${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日`;
        document.getElementById('budget').innerText = `💰 予算: ${Math.floor(budget/10000)}億${budget%10000}万円`;
        document.getElementById('record').innerText = `📊 成績: ${wins}勝 ${losses}敗`;
        document.getElementById('totalSalaryDisplay').innerText = `チーム総年俸: ${getTotalSalary().toLocaleString()}万円`;
        
        let body = "";
        let filtered = roster.filter(p => p.status === currentView);
        filtered.sort((a, b) => b.salary - a.salary);
        
        filtered.forEach(p => {
            let salaryClass = p.salary > 20000 ? 'class="salary-red"' : '';
            body += `<tr>
                <td>${p.name}</td><td>${p.age}</td><td>${p.meet}</td><td>${p.power}</td>
                <td ${salaryClass}>${p.salary.toLocaleString()}万</td><td>${p.status}軍</td>
                <td><button onclick="toggleStatus(${p.id})" style="padding:2px 8px; font-size:10px; background:#6c757d; color:white;">入替</button></td>
            </tr>`;
        });
        document.getElementById('rosterBody').innerHTML = body;
    }

    function toggleStatus(id) {
        let p = roster.find(x => x.id === id);
        p.status = p.status === 1 ? 2 : 1;
        updateUI();
    }

    function switchTab(t) {
        currentView = t;
        document.getElementById('tab1').className = t === 1 ? "tab active" : "tab";
        document.getElementById('tab2').className = t === 2 ? "tab active" : "tab";
        updateUI();
    }

    function addLog(msg) {
        const logBox = document.getElementById('logBox');
        const div = document.createElement('div');
        div.innerText = "> " + msg;
        logBox.insertBefore(div, logBox.firstChild);
        if(logBox.childNodes.length > 50) logBox.removeChild(logBox.lastChild);
    }

    function recruitForeigner() {
        if (budget >= 20000) {
            budget -= 20000;
            const fLast = ["ジョンソン", "スミス", "ロドリゲス", "ガルシア", "ウィリアムズ", "ブラウン"];
            const fFirst = ["マイク", "アレックス", "デビッド", "クリス", "ジョー"];
            const newP = {
                id: roster.length, 
                name: fLast[Math.floor(Math.random()*fLast.length)] + " " + fFirst[Math.floor(Math.random()*fFirst.length)],
                age: 28, bMonth: 1, bDay: 1, meet: 25, power: 92, salary: 45000, status: 1
            };
            roster.push(newP);
            addLog(`🌎 外国人 ${newP.name} を獲得しました！`);
            updateUI();
        } else { alert("予算不足です"); }
    }

    updateUI();
    updateProgressBar();
</script>
</body>
</html>
