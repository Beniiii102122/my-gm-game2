<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>プロ野球GMマネージャー - 143試合・パワプロ風能力版</title>
    <style>
        :root {
            --primary: #1a2a6c;
            --secondary: #b21f1f;
            --accent: #fdbb2d;
            --success: #00f260;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text-dark: #2c3e50;
        }

        body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; background: var(--bg); color: var(--text-dark); margin: 0; padding: 20px; overflow-x: hidden; }
        
        /* スタート画面 */
        #startScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a2a6c, #b21f1f);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.8s ease, visibility 0.8s; color: white; text-align: center;
        }
        #startScreen.hidden { opacity: 0; visibility: hidden; }
        .logo-main { font-size: 4rem; font-weight: 900; text-shadow: 4px 4px 0px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .start-btn { padding: 15px 60px; font-size: 1.5rem; font-weight: bold; color: var(--primary); background: var(--accent); border: none; border-radius: 50px; cursor: pointer; transition: all 0.3s ease; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(253, 187, 45, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(253, 187, 45, 0); } 100% { box-shadow: 0 0 0 0 rgba(253, 187, 45, 0); } }

        /* UIパーツ */
        .container { max-width: 1150px; margin: auto; }
        h1 { text-align: center; color: var(--primary); font-weight: 900; }
        .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 25px; }
        .stat-item { background: var(--primary); color: white; padding: 12px; border-radius: 12px; text-align: center; }
        .stat-value { font-size: 1.2em; font-weight: 800; display: block; margin-top: 5px; }
        .stat-label { font-size: 0.7em; opacity: 0.8; font-weight: bold; }

        /* 能力ランクの色 */
        .rank-S { color: #ff00ff; font-weight: bold; }
        .rank-A { color: #ff4500; font-weight: bold; }
        .rank-B { color: #ffa500; font-weight: bold; }
        .rank-C { color: #ffd700; font-weight: bold; }
        .rank-D { color: #32cd32; font-weight: bold; }
        .rank-E { color: #1e90ff; font-weight: bold; }
        .rank-F { color: #808080; font-weight: bold; }
        
        .main-card { background: var(--card-bg); border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 20px; gap: 10px; }
        .tab { padding: 12px 25px; cursor: pointer; font-weight: bold; color: #777; }
        .tab.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        
        .table-container { height: 450px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background: #f8f9fa; padding: 10px; font-size: 0.8em; position: sticky; top: 0; z-index: 10; }
        td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; font-size: 0.85em; }

        .log-container { margin-top: 20px; background: #1e1e2e; border-radius: 12px; padding: 15px; height: 120px; overflow-y: auto; color: #d1d1e0; font-family: monospace; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: white; margin: 5% auto; padding: 30px; border-radius: 20px; width: 85%; max-width: 800px; }
    </style>
</head>
<body>

<div id="startScreen">
    <div class="logo-main">ELITE GM</div>
    <button class="start-btn" onclick="startGame()">GAME START</button>
</div>

<div class="container">
    <h1>⚾ プロ野球GMマネージャー</h1>
    
    <div class="stats-grid">
        <div class="stat-item"><span class="stat-label">日付</span><span class="stat-value" id="date">2月1日</span></div>
        <div class="stat-item"><span class="stat-label">予算</span><span class="stat-value" id="budget">50.00億円</span></div>
        <div class="stat-item"><span class="stat-label">試合数</span><span class="stat-value" id="gameCount">0 / 143</span></div>
        <div class="stat-item"><span class="stat-label">勝率 (勝-敗-分)</span><span class="stat-value" id="record">.000 (0-0-0)</span></div>
        <div class="stat-item" style="background: var(--accent);"><span class="stat-label" style="color: var(--primary);">順位</span><span class="stat-value" id="rank" style="color: var(--primary);">- 位</span></div>
    </div>

    <div style="text-align: center; margin-bottom: 20px;">
        <button class="btn-day" onclick="advanceDays(1)" style="background:var(--primary); color:white;">1日進める</button>
        <button id="btnAuto" onclick="startAuto()" style="background:var(--secondary); color:white;">オート進行</button>
        <button id="btnStop" onclick="stopAuto()" style="display:none; background:#555; color:white;">停止</button>
    </div>

    <div class="main-card">
        <div class="tabs">
            <div id="tab1" class="tab active" onclick="switchTab(1)">1軍 投手</div>
            <div id="tab2" class="tab" onclick="switchTab(2)">1軍 野手</div>
            <div id="tab3" class="tab" onclick="switchTab(3)">2軍 育成</div>
        </div>
        <div class="table-container">
            <table>
                <thead id="tableHead"></thead>
                <tbody id="rosterBody"></tbody>
            </table>
        </div>
    </div>

    <div class="log-container" id="logBox"></div>
</div>

<div id="draftModal" class="modal">
    <div class="modal-content">
        <h2>🏆 ドラフト会議</h2>
        <p>指名候補を選択してください（残り <span id="draftLeftCount">3</span> 名）</p>
        <div id="draftCandidates" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin-top:20px;"></div>
    </div>
</div>

<script>
    // ランク変換
    function getRankChar(val) {
        if (val >= 90) return 'S'; if (val >= 80) return 'A'; if (val >= 70) return 'B';
        if (val >= 60) return 'C'; if (val >= 50) return 'D'; if (val >= 35) return 'E';
        if (val >= 15) return 'F'; return 'G';
    }
    function getRankSpan(val) {
        let r = getRankChar(val);
        return `<span class="rank-${r}">${r}(${val})</span>`;
    }
    function formatStat(val) {
        let s = val.toFixed(3); return s.startsWith("0") ? s.substring(1) : s;
    }

    let currentYear = 2026, budget = 500000, wins = 0, losses = 0, draws = 0, totalGames = 0;
    let date = new Date(currentYear, 1, 1), roster = [], autoTimer = null, currentTab = 1;
    const MAX_GAMES = 143;

    const lastNames = ["佐藤", "鈴木", "高橋", "田中", "伊藤", "渡辺", "山本", "中村", "小林", "加藤", "吉田", "山田"];
    const firstNames = ["翔", "蓮", "悠真", "陽翔", "結斗", "大和", "颯太", "健太", "拓海", "和也"];

    function createPlayer(pos, isDraft) {
        let p = {
            id: Math.random(), name: lastNames[Math.floor(Math.random()*lastNames.length)]+" "+firstNames[Math.floor(Math.random()*firstNames.length)],
            pos: pos, age: isDraft?18:24, status: isDraft?2:1, salary: 1000,
            games:0, win:0, lose:0, draw:0, era_run:0, era_ip:0, avg_ab:0, avg_h:0, hr:0, rbi:0
        };
        if(pos==='投手') {
            p.v_speed = Math.floor(Math.random()*25)+135; // 球速
            p.v_con = Math.floor(Math.random()*60)+20;   // コン
            p.v_sta = Math.floor(Math.random()*60)+20;   // スタ
        } else {
            p.b_dan = Math.floor(Math.random()*4)+1;      // 弾道
            p.b_meet = Math.floor(Math.random()*60)+20;   // ミート
            p.b_pow = Math.floor(Math.random()*60)+20;    // パワー
            p.b_run = Math.floor(Math.random()*60)+20;    // 走力
            p.b_arm = Math.floor(Math.random()*60)+20;    // 肩力
            p.b_def = Math.floor(Math.random()*60)+20;    // 守備
            p.b_cat = Math.floor(Math.random()*60)+20;    // 捕球
        }
        return p;
    }
    for(let i=0; i<60; i++) roster.push(createPlayer(i<25?'投手':'野手', false));

    function startGame() { document.getElementById('startScreen').classList.add('hidden'); addLog("シーズン開幕です！"); }

    function advanceDays(days) {
        for(let i=0; i<days; i++) {
            date.setDate(date.getDate() + 1);
            let m = date.getMonth(), d = date.getDate();
            if (d === 1) budget -= Math.floor(roster.reduce((s,p)=>s+p.salary,0)/12);
            if (m === 9 && d === 20) { stopAuto(); openDraft(); return; }
            if (totalGames < MAX_GAMES && m >= 2 && m <= 8) {
                if (m > 2 || d >= 25) { if (Math.random() < 0.8) simulateGame(); }
            }
        }
        updateUI();
    }

    function simulateGame() {
        totalGames++;
        let roll = Math.random();
        let res = roll < 0.08 ? "D" : (roll < 0.54 ? "W" : "L");
        if(res === "W") wins++; else if(res === "L") losses++; else draws++;
        
        let p = roster.filter(x=>x.pos==='投手' && x.status===1)[Math.floor(Math.random()*10)];
        if(p) { 
            p.games++; if(res==="W") p.win++; else if(res==="L") p.lose++; else p.draw++;
            p.era_ip += (res==="D"?12:9); 
            p.era_run += Math.max(0, 10 - (p.v_con/10));
        }
        roster.filter(x=>x.pos==='野手' && x.status===1).forEach(b => {
            b.games++; let ab = (res==="D"?5:4); b.avg_ab += ab;
            for(let j=0; j<ab; j++) if(Math.random() < (b.b_meet/350)+0.22) b.avg_h++;
            if(Math.random() < (b.b_pow/450)) { b.hr++; b.rbi += Math.floor(Math.random()*2)+1; }
        });
    }

    function updateUI() {
        document.getElementById('date').innerText = `${date.getMonth()+1}月${date.getDate()}日`;
        document.getElementById('budget').innerText = `${(budget/10000).toFixed(2)}億円`;
        document.getElementById('gameCount').innerText = `${totalGames} / ${MAX_GAMES}`;
        let wr = (wins+losses===0) ? 0 : wins/(wins+losses);
        document.getElementById('record').innerText = `${formatStat(wr)} (${wins}-${losses}-${draws})`;
        renderTable();
    }

    function renderTable() {
        let head = currentTab === 1 ? `<tr><th>名前</th><th>球速</th><th>コン</th><th>スタ</th><th>防御率</th><th>勝-敗</th><th>一軍</th></tr>` :
                   currentTab === 2 ? `<tr><th>名前</th><th>弾道</th><th>ミ</th><th>パ</th><th>走</th><th>肩</th><th>守</th><th>捕</th><th>打率</th><th>本</th><th>一軍</th></tr>` :
                                      `<tr><th>名前</th><th>守備</th><th>能力ランク</th><th>年俸</th><th>昇格</th></tr>`;
        document.getElementById('tableHead').innerHTML = head;
        let body = "";
        let filtered = roster.filter(p => (currentTab===1 && p.pos==='投手' && p.status===1) || (currentTab===2 && p.pos==='野手' && p.status===1) || (currentTab===3 && p.status===2));
        
        filtered.forEach(p => {
            let row = `<td><b>${p.name}</b></td>`;
            if(currentTab === 1) {
                row += `<td>${p.v_speed}km</td><td>${getRankSpan(p.v_con)}</td><td>${getRankSpan(p.v_sta)}</td><td>${(p.era_run*9/(p.era_ip||1)).toFixed(2)}</td><td>${p.win}-${p.lose}</td>`;
            } else if(currentTab === 2) {
                row += `<td>${p.b_dan}</td><td>${getRankSpan(p.b_meet)}</td><td>${getRankSpan(p.b_pow)}</td><td>${getRankSpan(p.b_run)}</td><td>${getRankSpan(p.b_arm)}</td><td>${getRankSpan(p.b_def)}</td><td>${getRankSpan(p.b_cat)}</td><td>${formatStat(p.avg_h/(p.avg_ab||1))}</td><td>${p.hr}</td>`;
            } else {
                let mainStat = p.pos==='投手' ? p.v_speed+'km' : '弾道'+p.b_dan;
                row += `<td>${p.pos}</td><td>${mainStat}</td><td>${p.salary}万</td>`;
            }
            body += `<tr>${row}<td><button onclick="toggleStatus(${p.id})">入替</button></td></tr>`;
        });
        document.getElementById('rosterBody').innerHTML = body;
    }

    function openDraft() {
        let picks = 3; document.getElementById('draftLeftCount').innerText = picks;
        const div = document.getElementById('draftCandidates'); div.innerHTML = "";
        for(let i=0; i<6; i++) {
            let p = createPlayer(Math.random()>0.5?'投手':'野手', true);
            let btn = document.createElement('button'); btn.style.padding="10px";
            btn.innerHTML = `${p.name}<br>${p.pos}<br>${p.pos==='投手'?p.v_speed+'km':'ミ'+getRankChar(p.b_meet)+'パ'+getRankChar(p.b_pow)}`;
            btn.onclick = () => { roster.push(p); btn.disabled=true; btn.style.opacity=0.3; picks--; document.getElementById('draftLeftCount').innerText=picks; if(picks===0) document.getElementById('draftModal').style.display='none'; };
            div.appendChild(btn);
        }
        document.getElementById('draftModal').style.display = 'block';
    }

    function startAuto() { if(!autoTimer) { document.getElementById('btnAuto').style.display='none'; document.getElementById('btnStop').style.display='inline-block'; autoTimer=setInterval(()=>advanceDays(1), 60); } }
    function stopAuto() { clearInterval(autoTimer); autoTimer=null; document.getElementById('btnAuto').style.display='inline-block'; document.getElementById('btnStop').style.display='none'; }
    function toggleStatus(id) { let p=roster.find(x=>x.id===id); p.status=p.status===1?2:1; renderTable(); }
    function switchTab(t) { currentTab=t; document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active', i+1===t)); renderTable(); }
    function addLog(msg) { const box = document.getElementById('logBox'); box.innerHTML = `<div>[${date.getMonth()+1}/${date.getDate()}] ${msg}</div>` + box.innerHTML; }

    updateUI();
</script>
</body>
</html>
