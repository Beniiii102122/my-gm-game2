<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>本格派GMシミュレーター Extreme</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #e9ecef; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1a3a5a; border-bottom: 2px solid #1a3a5a; padding-bottom: 10px; }
        .stats { display: flex; justify-content: space-around; background: #1a3a5a; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; }
        
        /* 操作パネルの強化 */
        .control-panel { background: #f8f9fa; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; text-align: center; }
        .btn-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; transition: 0.2s; }
        .btn-day { background: #007bff; color: white; }
        .btn-week { background: #6610f2; color: white; }
        .btn-month { background: #e83e8c; color: white; }
        .btn-auto { background: #dc3545; color: white; }
        .btn-stop { background: #6c757d; color: white; }
        .btn-recruit { background: #fd7e14; color: white; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        button:disabled { background: #ccc; cursor: not-allowed; }

        .tabs { display: flex; border-bottom: 2px solid #ddd; margin-bottom: 15px; }
        .tab { padding: 10px 20px; cursor: pointer; background: #eee; border-radius: 5px 5px 0 0; margin-right: 5px; }
        .tab.active { background: #1a3a5a; color: white; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 0.85em; }
        th, td { border: 1px solid #dee2e6; padding: 8px; text-align: center; }
        th { background: #f8f9fa; position: sticky; top: 0; }
        .table-container { height: 400px; overflow-y: auto; border: 1px solid #ddd; }
        .log { height: 200px; overflow-y: scroll; background: #222; color: #00ff00; padding: 15px; margin-top: 20px; font-family: 'Courier New', monospace; border-radius: 5px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚾️ プロ野球GMシミュレーター Extreme</h1>
    
    <div class="stats">
        <div id="date">📅 2026年2月1日</div>
        <div id="budget">💰 50億0000万円</div>
        <div id="record">📊 0勝 0敗</div>
    </div>

    <div class="control-panel">
        <div class="btn-group">
            <button class="btn-day" id="btn1" onclick="advanceDays(1)">1日進める</button>
            <button class="btn-week" id="btn7" onclick="advanceDays(7)">1週間進める</button>
            <button class="btn-month" id="btn30" onclick="advanceDays(30)">1ヶ月進める</button>
            <button class="btn-auto" id="btnAuto" onclick="startAuto()">オート進行開始</button>
            <button class="btn-stop" id="btnStop" onclick="stopAuto()" style="display:none;">停止</button>
            <button class="btn-recruit" onclick="recruitForeigner()">🌎 新外国人調査 (2億)</button>
        </div>
        <div id="autoStatus" style="font-size: 0.8em; color: #666;"></div>
    </div>

    <div class="tabs">
        <div id="tab1" class="tab active" onclick="switchTab(1)">1軍 (主力)</div>
        <div id="tab2" class="tab" onclick="switchTab(2)">2軍 (調整・若手)</div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>名前</th><th>年齢</th><th>誕生日</th><th>ミート</th><th>パワー</th><th>状態</th><th>入替</th>
                </tr>
            </thead>
            <tbody id="rosterBody"></tbody>
        </table>
    </div>

    <div class="log" id="logBox">>> GM業務を開始します。</div>
</div>

<script>
    let date = new Date(2026, 1, 1);
    let budget = 500000;
    let wins = 0; let losses = 0;
    let currentView = 1;
    let roster = [];
    let autoTimer = null;

    // 初期選手60名を生成
    const names = ["佐藤", "鈴木", "高橋", "田中", "伊藤", "渡辺", "山本", "中村", "小林", "加藤", "吉田", "山田", "佐々木", "山口", "松本", "井上", "木村", "林", "斎藤", "清水"];
    for(let i=0; i<60; i++) {
        roster.push({
            id: i,
            name: names[i % names.length] + (Math.floor(i/names.length) + 1),
            age: Math.floor(Math.random() * 18) + 18,
            bMonth: Math.floor(Math.random() * 12) + 1,
            bDay: Math.floor(Math.random() * 28) + 1,
            meet: Math.floor(Math.random() * 40) + 20,
            power: Math.floor(Math.random() * 40) + 20,
            status: i < 30 ? 1 : 2
        });
    }

    function advanceDays(days) {
        for(let i=0; i<days; i++) {
            date.setDate(date.getDate() + 1);
            checkEvents();
        }
        updateUI();
    }

    function checkEvents() {
        // 誕生日判定
        roster.forEach(p => {
            if (p.bMonth === date.getMonth()+1 && p.bDay === date.getDate()) {
                p.age += 1;
                addLog(`🎂 ${date.getMonth()+1}/${date.getDate()}: ${p.name}が${p.age}歳の誕生日！`);
            }
        });
        // 試合判定 (3月〜10月)
        if (date.getMonth() >= 2 && date.getMonth() <= 9 && Math.random() < 0.22) {
            if (Math.random() > 0.5) { wins++; addLog(`⚾️ ${date.getMonth()+1}/${date.getDate()} 試合勝利！`); }
            else { losses++; addLog(`⚾️ ${date.getMonth()+1}/${date.getDate()} 試合敗戦...`); }
        }
    }

    function startAuto() {
        if(autoTimer) return;
        document.getElementById('btnAuto').style.display = 'none';
        document.getElementById('btnStop').style.display = 'inline-block';
        document.getElementById('autoStatus').innerText = "⚡ オート進行中...";
        autoTimer = setInterval(() => {
            advanceDays(1);
        }, 100); // 0.1秒ごとに1日進む
    }

    function stopAuto() {
        clearInterval(autoTimer);
        autoTimer = null;
        document.getElementById('btnAuto').style.display = 'inline-block';
        document.getElementById('btnStop').style.display = 'none';
        document.getElementById('autoStatus').innerText = "";
    }

    function switchTab(t) {
        currentView = t;
        document.getElementById('tab1').className = t === 1 ? "tab active" : "tab";
        document.getElementById('tab2').className = t === 2 ? "tab active" : "tab";
        updateUI();
    }

    function toggleStatus(id) {
        let p = roster.find(x => x.id === id);
        p.status = p.status === 1 ? 2 : 1;
        updateUI();
    }

    function updateUI() {
        document.getElementById('date').innerText = `📅 ${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日`;
        document.getElementById('budget').innerText = `💰 予算: ${Math.floor(budget/10000)}億${budget%10000}万円`;
        document.getElementById('record').innerText = `📊 成績: ${wins}勝 ${losses}敗`;
        
        let body = "";
        let filtered = roster.filter(p => p.status === currentView);
        filtered.forEach(p => {
            body += `<tr>
                <td>${p.name}</td><td>${p.age}</td><td>${p.bMonth}/${p.bDay}</td>
                <td>${p.meet}</td><td>${p.power}</td><td>${p.status}軍</td>
                <td><button onclick="toggleStatus(${p.id})" style="padding:2px 8px; font-size:10px; background:#6c757d; color:white;">入替</button></td>
            </tr>`;
        });
        document.getElementById('rosterBody').innerHTML = body;
    }

    function addLog(msg) {
        const logBox = document.getElementById('logBox');
        const div = document.createElement('div');
        div.innerText = "> " + msg;
        logBox.insertBefore(div, logBox.firstChild);
        if(logBox.childNodes.length > 50) logBox.removeChild(logBox.lastChild); // ログが増えすぎないよう制限
    }

    function recruitForeigner() {
        if (budget >= 20000) {
            budget -= 20000;
            const newP = {
                id: roster.length, name: "助っ人" + (roster.length - 59),
                age: 27, bMonth: 1, bDay: 1, meet: 30, power: 88, status: 1
            };
            roster.push(newP);
            addLog(`🌎 新外国人 ${newP.name} を獲得しました！`);
            updateUI();
        } else { alert("予算不足です"); }
    }

    updateUI();
</script>
</body>
</html>
